<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CanSat 2026</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>

  <body>
    <a-scene background="color: #222">

      <a-assets>
        <a-asset-item id="museo" src="museo(1).glb"></a-asset-item>
        <a-asset-item id="sentinel2" src="sentinel2.glb"></a-asset-item>
        <a-asset-item id="sentinel3" src="sentinel3.glb"></a-asset-item>
        <img id="grupo" src="FOTO_GRUPO.jpg">
       <video id="garficas" src="graficas.mp4" autoplay loop crossorigin="anonymous"></video>
      </a-assets>

      <!-- Museo  escalado y ubicado -->
      <a-entity gltf-model="#museo" scale="2 1.5 2" position="0 0 0"></a-entity>

       <!-- Cámara dentro del museo -->
       <!-- Punto al que debe mirar al inicio -->
          <a-entity id="inicioTarget" position="10.8 0.5 0"></a-entity>
      
      <a-camera
          position="5 0.5 0"
          look-at="#inicioTarget"
          wasd-controls="acceleration: 40"
          look-controls="pointerLockEnabled: false">

         <a-cursor></a-cursor>
       </a-camera>

      <!-- Modelo 3D colocado dentro del museo -->
      <a-plane position="10.8 0.15 0" rotation="0 -90 0"  width="6"  height="6"  material="src: #grupo; side: double;"> </a-plane>
      <a-plane position="6.5 0.15 -9.2" rotation="0 0 0"  width="6"  height="5"  material="src: #graficas; side: double;"> </a-plane>
     
       <a-entity gltf-model="#sentinel3"
          scale="0.09 0.09 0.09"
          position="8 2.5 0"
          rotation="0 180 0"
          animation="property: position;
                     to: 8 2.5 -7;
                     dur: 6000;
                     dir: alternate;
                     loop: true;
                     easing: easeInOutSine">
        </a-entity>
      <a-entity gltf-model="#sentinel2"
          scale="0.09 0.09 0.09"
          position="6 2.5 -7"
          rotation="0 90 0"
          animation="property: position;
                     to: 6 2.5 0;
                     dur: 6000;
                     dir: alternate;
                     loop: true;
                     easing: easeInOutSine">
        </a-entity>
     

      <!-- Luz ambiente -->
      <a-entity light="type: ambient; intensity: 0.75></a-entity>
      <a-entity light="type: directional; intensity: 0.75" position="1 4 1"></a-entity>
    </a-scene>


  </body>
</html>
